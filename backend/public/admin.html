<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Memory Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input {
            flex: 1;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 15px 30px;
            font-size: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
        }

        .stat {
            font-size: 14px;
            color: #666;
        }

        .stat strong {
            color: #667eea;
            font-size: 18px;
        }

        .memory-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .memory-item {
            border: 2px solid #e0e0e0;
            padding: 20px;
            border-radius: 10px;
            transition: border-color 0.3s, transform 0.2s;
        }

        .memory-item:hover {
            border-color: #667eea;
            transform: translateX(5px);
        }

        .memory-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .memory-id {
            color: #999;
            font-size: 11px;
            font-family: 'Courier New', monospace;
        }

        .memory-tags {
            display: flex;
            gap: 5px;
        }

        .tag {
            background: #667eea;
            color: white;
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: 600;
        }

        .memory-content {
            margin: 10px 0;
            color: #333;
            line-height: 1.6;
        }

        .delete-btn {
            background: linear-gradient(135deg, #ff4444 0%, #cc0000 100%);
            padding: 8px 20px;
            font-size: 14px;
        }

        .delete-btn:hover {
            box-shadow: 0 5px 15px rgba(255, 68, 68, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🛠️ Neon Memory Admin</h1>
        <p class="subtitle">Suche und lösche Memory-Einträge</p>

        <div class="search-box">
            <input id="searchInput" type="text" placeholder="Suchbegriff eingeben (z.B. 'Phoenix')..."
                onkeypress="if(event.key==='Enter') searchMemories()">
            <button onclick="searchMemories()">🔍 Suchen</button>
        </div>

        <div id="stats" class="stats" style="display: none;">
            <div class="stat">
                Gefunden: <strong id="resultCount">0</strong>
            </div>
        </div>

        <div id="results" class="memory-list"></div>
    </div>

    <script>
        let currentResults = [];

        async function searchMemories() {
            const query = document.getElementById('searchInput').value.trim();

            if (!query) {
                alert('Bitte Suchbegriff eingeben');
                return;
            }

            const resultsDiv = document.getElementById('results');
            const statsDiv = document.getElementById('stats');
            const resultCount = document.getElementById('resultCount');

            // Show loading
            resultsDiv.innerHTML = '<div class="loading"><div class="spinner"></div>Suche läuft...</div>';
            statsDiv.style.display = 'none';

            try {
                const response = await fetch(`/api/admin/memories/search?q=${encodeURIComponent(query)}&userId=default-user`);
                const memories = await response.json();

                currentResults = memories;
                resultCount.textContent = memories.length;
                statsDiv.style.display = 'flex';

                if (memories.length === 0) {
                    resultsDiv.innerHTML = `
                        <div class="empty-state">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                            </svg>
                            <h3>Keine Einträge gefunden</h3>
                            <p>Probiere einen anderen Suchbegriff</p>
                        </div>
                    `;
                    return;
                }

                resultsDiv.innerHTML = memories.map(m => `
                    <div class="memory-item" id="memory-${m.id}">
                        <div class="memory-header">
                            <div class="memory-id">ID: ${m.id}</div>
                            <div class="memory-tags">
                                ${(m.tags || []).map(tag => `<span class="tag">${tag}</span>`).join('')}
                            </div>
                        </div>
                        <div class="memory-content">${escapeHtml(m.content)}</div>
                        <button class="delete-btn" onclick="deleteMemory('${m.id}')">🗑️ Löschen</button>
                    </div>
                `).join('');
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="empty-state">
                        <h3>❌ Fehler beim Suchen</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        async function deleteMemory(id) {
            if (!confirm('Diesen Memory-Eintrag wirklich löschen?')) return;

            try {
                const response = await fetch(`/api/admin/memory/${id}`, { method: 'DELETE' });

                if (response.ok) {
                    // Remove from UI
                    const element = document.getElementById(`memory-${id}`);
                    element.style.transform = 'translateX(-100%)';
                    element.style.opacity = '0';
                    element.style.transition = 'all 0.3s';

                    setTimeout(() => {
                        element.remove();
                        currentResults = currentResults.filter(m => m.id !== id);
                        document.getElementById('resultCount').textContent = currentResults.length;

                        if (currentResults.length === 0) {
                            document.getElementById('results').innerHTML = `
                                <div class="empty-state">
                                    <h3>✅ Alle Einträge gelöscht</h3>
                                </div>
                            `;
                        }
                    }, 300);
                } else {
                    alert('Fehler beim Löschen');
                }
            } catch (error) {
                alert('Fehler: ' + error.message);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Auto-search if URL has query param
        const urlParams = new URLSearchParams(window.location.search);
        const autoQuery = urlParams.get('q');
        if (autoQuery) {
            document.getElementById('searchInput').value = autoQuery;
            searchMemories();
        }
    </script>
</body>

</html>
